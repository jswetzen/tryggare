# Portainer / GHCR deployment variant: same topology as docker-compose.prod.yml
# but pulls the pre-built image from ghcr.io instead of building locally.
# Intended for Portainer stack deployments — see docs/portainer-deployment-guide.md.
name: ${COMPOSE_PROJECT_NAME:-check-in-prod}
services:
  # Django backend serving both API and frontend
  # Image is built by GitHub Actions and pushed to GHCR on every push to main
  web:
    image: ghcr.io/jswetzen/check-ins:latest
    environment:
      # Empty strings = use relative paths (browser uses current host/port)
      - VITE_PUBLIC_API_BASE_URL=${VITE_PUBLIC_API_BASE_URL:-}  # Client-side (Browser -> Django)
      - VITE_PUBLIC_WS_BASE_URL=${VITE_PUBLIC_WS_BASE_URL:-}
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - DATABASE_URL=${DATABASE_URL}
      - VALKEY_URL=${VALKEY_URL}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-}
      # Cookie security: set to 'false' for HTTP testing, 'true' for HTTPS/reverse proxy
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
      - CSRF_COOKIE_SECURE=${CSRF_COOKIE_SECURE:-false}
    ports:
      - "${WEB_HOST_PORT:-8080}:8000"
    labels:
      traefik.enable: "${TRAEFIK_ENABLE:-false}"
      traefik.http.routers.checkins.rule: "Host(`${TRAEFIK_HOST:-checkins.example.com}`)"
      traefik.http.routers.checkins.entrypoints: "${TRAEFIK_ENTRYPOINT:-websecure}"
      traefik.http.routers.checkins.tls.certresolver: "${TRAEFIK_CERTRESOLVER:-le}"
      traefik.docker.network: "${TRAEFIK_NETWORK:-traefik}"
    depends_on:
      db-prod:
        condition: service_healthy
      valkey-prod:
        condition: service_healthy
    networks:
      - frontend
      - backend
      - traefik
    restart: unless-stopped
    logging:
      options:
        max-size: "${LOG_MAX_SIZE:-5m}"
        max-file: "${LOG_MAX_FILES:-3}"

  db-prod:
    image: ${POSTGRES_IMAGE:-docker.io/postgres:16-alpine}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-checkins}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data_prod:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      options:
        max-size: "${LOG_MAX_SIZE:-5m}"
        max-file: "${LOG_MAX_FILES:-3}"

  valkey-prod:
    image: ${VALKEY_IMAGE:-docker.io/valkey/valkey:7-alpine}
    command: valkey-server --requirepass "${REDIS_PASSWORD}"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - backend
    healthcheck:
      test: ["CMD", "sh", "-c", "valkey-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true  # Backend network has no external access
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}

volumes:
  pg_data_prod:

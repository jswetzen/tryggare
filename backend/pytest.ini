[pytest]
DJANGO_SETTINGS_MODULE = config.settings.local
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --reuse-db

markers =
    e2e: End-to-end tests using Selenium
    integration: Integration tests
    unit: Unit tests
    slow: Slow-running tests
    auth: Authentication tests
    checkin: Check-in flow tests
    checkout: Check-out flow tests
    qr: QR page tests
    print: Print queue tests
    i18n: Internationalization tests
    navigation: Navigation and UI tests
    websocket: WebSocket real-time update tests

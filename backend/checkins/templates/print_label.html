<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Label - {{ checkin.child.first_name }} {{ checkin.child.last_name }}</title>
    <style>
        @page {
            size: 54.3mm 17mm; /* Width x Height (portrait) */
            margin: 0;
        }

        @media print {
            body {
                margin: 0;
                padding: 0;
            }
            .no-print {
                display: none;
            }
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            width: 54.3mm;
            height: 17mm;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .label {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1mm 2mm;
            box-sizing: border-box;
        }

        .child-name {
            font-size: 6pt;
            font-weight: bold;
            word-wrap: break-word;
            flex: 1;
            text-align: left;
            padding-right: 2mm;
        }

        .qr-code {
            width: 15mm;
            height: 15mm;
            flex-shrink: 0;
        }

        .no-print {
            margin-top: 10mm;
            text-align: center;
            font-size: 10pt;
        }

        .no-print button {
            padding: 8px 16px;
            font-size: 10pt;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }

        .no-print button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="label">
        <div class="child-name">{{ checkin.child.first_name }} {{ checkin.child.last_name }}</div>
        <img src="{{ qr_url }}" alt="QR Code" class="qr-code">
    </div>

    <div class="no-print">
        <button onclick="window.print()">Print Label</button>
    </div>

    <script>
        // Auto-print after a short delay to let page render
        setTimeout(function() {
            window.print();
        }, 500);
    </script>
</body>
</html>

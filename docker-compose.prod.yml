version: '3.9'

services:
  # PostgreSQL Database Service
  db:
    image: docker.io/postgres:16-alpine
    container_name: conference-db-prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-conference-child-mgmt}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - conference-network

  # Next.js Application Service - Production Mode
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        # Build-time arguments if needed
        NODE_ENV: production
    container_name: conference-app-prod
    restart: always
    environment:
      # Database connection
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-conference-child-mgmt}"

      # Authentication - MUST be set in production
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      AUTH_SECRET: "${AUTH_SECRET:?AUTH_SECRET environment variable is required}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:?NEXTAUTH_SECRET environment variable is required}"

      # Initial admin credentials
      INITIAL_ADMIN_USERNAME: "${INITIAL_ADMIN_USERNAME:-admin}"
      INITIAL_ADMIN_PASSWORD: "${INITIAL_ADMIN_PASSWORD:?INITIAL_ADMIN_PASSWORD environment variable is required}"

      # Production environment
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1

      # Server configuration
      HOSTNAME: "0.0.0.0"
      PORT: 3000
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - conference-network
    # Security: read-only root filesystem (uncomment if your app supports it)
    # read_only: true
    # tmpfs:
    #   - /tmp
    #   - /app/.next/cache

    # Resource limits (adjust based on your needs)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

# Named volumes for data persistence
volumes:
  postgres_data_prod:
    driver: local

# Network for service communication
networks:
  conference-network:
    driver: bridge

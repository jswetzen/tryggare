version: '3.9'

name: check-in-prod
services:
  # Django backend serving both API and frontend
  # Frontend is built in the Dockerfile's first stage
  web:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    environment:
      # Empty strings = use relative paths (browser uses current host/port)
      - VITE_PUBLIC_API_BASE_URL=  # Client-side (Browser -> Django)
      - VITE_PUBLIC_WS_BASE_URL=
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - DATABASE_URL=postgresql://postgres:postgres@db-prod:5432/checkins
      - VALKEY_URL=redis://valkey-prod:6379/0
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-}
      # Cookie security: set to 'false' for HTTP testing, 'true' for HTTPS/reverse proxy
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
      - CSRF_COOKIE_SECURE=${CSRF_COOKIE_SECURE:-false}
    ports:
      - "8080:8000"
    depends_on:
      db-prod:
        condition: service_healthy
      valkey-prod:
        condition: service_healthy
    restart: unless-stopped
    logging:
      options:
        max-size: "50m"
        path: /home/johan/git/check-ins/web.log

  db-prod:
    image: docker.io/postgres:16-alpine
    environment:
      POSTGRES_DB: checkins
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"  # Expose for testing (different port than dev DB)
    volumes:
      - pg_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  valkey-prod:
    image: docker.io/valkey/valkey:7-alpine
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pg_data_prod:

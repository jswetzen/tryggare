version: '3.9'

name: check-in-prod
services:
  # Django backend serving both API and frontend
  # Frontend is built in the Dockerfile's first stage
  web:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    environment:
      # Empty strings = use relative paths (browser uses current host/port)
      - VITE_PUBLIC_API_BASE_URL=  # Client-side (Browser -> Django)
      - VITE_PUBLIC_WS_BASE_URL=
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      # Using simple password to match existing database volume
      - DATABASE_URL=postgresql://postgres:password@db-prod:5432/checkins
      - VALKEY_URL=redis://:qfONulCAjKP3ugs4yaQn26SLSSTNG%2FYMRDPZe4bs%2BUc%3D@valkey-prod:6379/0
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-}
      # Cookie security: set to 'false' for HTTP testing, 'true' for HTTPS/reverse proxy
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
      - CSRF_COOKIE_SECURE=${CSRF_COOKIE_SECURE:-false}
    ports:
      - "8080:8000"
    depends_on:
      db-prod:
        condition: service_healthy
      valkey-prod:
        condition: service_healthy
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped
    logging:
      options:
        max-size: "5m"
        max-file: "3"
        path: /home/johan/git/check-ins/web.prod.log

  db-prod:
    image: docker.io/postgres:16-alpine
    environment:
      POSTGRES_DB: checkins
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    # Port exposure removed for security - use Docker network for access
    # For testing, use: podman exec -it <container> psql -U ${DB_USER} checkins
    volumes:
      - pg_data_prod:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      options:
        max-size: "5m"
        max-file: "3"
        path: /home/johan/git/check-ins/db.prod.log

  valkey-prod:
    image: docker.io/valkey/valkey:7-alpine
    command: valkey-server --requirepass "${REDIS_PASSWORD}"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "sh", "-c", "valkey-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true  # Backend network has no external access

volumes:
  pg_data_prod:

version: '3.9'

services:
  # PostgreSQL Database Service
  db:
    image: docker.io/postgres:16-alpine
    container_name: conference-db-prod
    restart: always
    environment:
      POSTGRES_DB: conference-child-mgmt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - conference-network

  # Init container - runs migrations and seeding once
  init:
    build:
      context: .
      dockerfile: Dockerfile
      target: init
    container_name: conference-init-prod
    environment:
      # Database connection
      DATABASE_URL: "postgresql://postgres:password@db:5432/conference-child-mgmt"

      # Initial admin credentials
      INITIAL_ADMIN_USERNAME: "${INITIAL_ADMIN_USERNAME:-admin}"
      INITIAL_ADMIN_PASSWORD: "${INITIAL_ADMIN_PASSWORD:-changeme123}"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - conference-network
    restart: "no"  # Only run once

  # Next.js Application Service - Production Mode
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        # Build-time arguments - allow pre-rendering with database access
        NODE_ENV: production
        DATABASE_URL: "postgresql://postgres:password@db:5432/conference-child-mgmt"
        AUTH_SECRET: "${AUTH_SECRET:-build-time-dummy-secret}"
    container_name: conference-app-prod
    restart: always
    environment:
      # Database connection
      DATABASE_URL: "postgresql://postgres:password@db:5432/conference-child-mgmt"

      # Authentication - MUST be set in production
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      AUTH_SECRET: "${AUTH_SECRET:-your-secret-key-here-replace-with-random-string}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-your-secret-key-here-replace-with-random-string}"
      AUTH_TRUST_HOST: "true"

      # Initial admin credentials
      INITIAL_ADMIN_USERNAME: "${INITIAL_ADMIN_USERNAME:-admin}"
      INITIAL_ADMIN_PASSWORD: "${INITIAL_ADMIN_PASSWORD:-changeme123}"

      # Production environment
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1

      # Server configuration
      HOSTNAME: "0.0.0.0"
      PORT: 3000
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - conference-network
    # Security: read-only root filesystem (uncomment if your app supports it)
    # read_only: true
    # tmpfs:
    #   - /tmp
    #   - /app/.next/cache

    # Resource limits (adjust based on your needs)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

# Named volumes for data persistence
volumes:
  postgres_data_prod:
    driver: local

# Network for service communication
networks:
  conference-network:
    driver: bridge

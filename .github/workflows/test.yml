name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      SECRET_KEY: test-secret-key-for-ci
      ENV_FILE: /dev/null
      DJANGO_SETTINGS_MODULE: config.settings.base

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v

      - name: Lint with ruff
        run: uv run ruff check .

  design-tokens:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check design tokens stay in sync
        run: npm run check:tokens

  marketing-tokens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check marketing tokens match canonical
        run: |
          git fetch origin gh-pages --depth=1
          git show origin/gh-pages:colors_and_type.css > /tmp/marketing-tokens.css
          node frontend/scripts/check-marketing-tokens.mjs /tmp/marketing-tokens.css

version: '3.9'

services:
  web:
    build: ./backend
    command: >-
      sh -c "uv sync --frozen --no-dev &&
      exec uv run python -m daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    env_file:
      - backend/.env.example
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    ports:
      - "8000:8000"
    depends_on:
      - db
      - valkey
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport socket\ns = socket.create_connection(('localhost', 8000), 2)\ns.close()\nPY"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build: ./frontend
    command: >-
      sh -c "CI=true pnpm install --frozen-lockfile &&
      exec pnpm dev --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_WS_BASE_URL=ws://localhost:8000/ws

  db:
    image: docker.io/postgres:16-alpine
    environment:
      POSTGRES_DB: checkins
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: docker.io/valkey/valkey:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pg_data:
  backend_venv:
  frontend_node_modules:

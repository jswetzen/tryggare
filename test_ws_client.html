<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test Client</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        #status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .connected {
            background-color: #d4edda;
            color: #155724;
        }
        .disconnected {
            background-color: #f8d7da;
            color: #721c24;
        }
        .connecting {
            background-color: #fff3cd;
            color: #856404;
        }
        #messages {
            border: 1px solid #ccc;
            padding: 10px;
            height: 400px;
            overflow-y: auto;
            margin: 10px 0;
            background-color: #f5f5f5;
        }
        .message {
            margin: 5px 0;
            padding: 5px;
            background-color: white;
            border-radius: 3px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>WebSocket Test Client</h1>

    <div id="status" class="disconnected">Status: Disconnected</div>

    <div>
        <button onclick="connect()">Connect</button>
        <button onclick="disconnect()">Disconnect</button>
        <button onclick="clearMessages()">Clear Messages</button>
    </div>

    <h2>Messages:</h2>
    <div id="messages"></div>

    <script>
        let socket = null;
        const statusDiv = document.getElementById('status');
        const messagesDiv = document.getElementById('messages');

        function updateStatus(status, className) {
            statusDiv.textContent = 'Status: ' + status;
            statusDiv.className = className;
        }

        function addMessage(message, type = 'info') {
            const div = document.createElement('div');
            div.className = 'message';
            const timestamp = new Date().toLocaleTimeString();
            div.innerHTML = `<strong>[${timestamp}] ${type}:</strong> ${JSON.stringify(message, null, 2)}`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function connect() {
            if (socket && socket.readyState === WebSocket.OPEN) {
                addMessage('Already connected', 'warning');
                return;
            }

            updateStatus('Connecting...', 'connecting');
            addMessage('Attempting to connect to ws://localhost:8000/ws/checkins/', 'info');

            socket = new WebSocket('ws://localhost:8000/ws/checkins/');

            socket.onopen = function(e) {
                updateStatus('Connected', 'connected');
                addMessage('Connection established', 'success');
            };

            socket.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    addMessage(data, 'message');
                } catch (e) {
                    addMessage(event.data, 'message');
                }
            };

            socket.onerror = function(error) {
                addMessage('WebSocket Error: ' + error, 'error');
                console.error('WebSocket error:', error);
            };

            socket.onclose = function(event) {
                updateStatus('Disconnected', 'disconnected');
                addMessage(`Connection closed (code: ${event.code}, reason: ${event.reason})`, 'info');
            };
        }

        function disconnect() {
            if (socket) {
                socket.close();
                socket = null;
            }
        }

        function clearMessages() {
            messagesDiv.innerHTML = '';
        }

        // Auto-connect on load
        window.onload = function() {
            connect();
        };
    </script>
</body>
</html>

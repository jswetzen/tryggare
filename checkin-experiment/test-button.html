<!DOCTYPE html>
<html>
<head>
  <title>Button Test</title>
  <style>
    button {
      padding: 16px 24px;
      background: #2563eb;
      color: white;
      font-weight: 600;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      margin: 20px;
      font-size: 16px;
    }
    button:hover {
      background: #1d4ed8;
    }
    #result {
      margin: 20px;
      padding: 20px;
      background: #f1f5f9;
      border-radius: 8px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <h1 style="margin: 20px;">Button Click Test</h1>

  <button onclick="handleClick()">Test Button</button>

  <div id="result">Click count: 0</div>

  <script>
    let count = 0;
    function handleClick() {
      count++;
      document.getElementById('result').textContent = 'Click count: ' + count;
      console.log('Button clicked!', count);
    }
  </script>
</body>
</html>
